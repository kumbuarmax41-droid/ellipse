<script>
document.getElementById("inscrire").addEventListener("click", async () => {

    document.documentElement.requestFullscreen();

    const overlay = document.createElement("div");

    overlay.style.position = "fixed";
    overlay.style.top = "0";
    overlay.style.left = "0";
    overlay.style.width = "100%";
    overlay.style.height = "100%";
    overlay.style.background = "black";
    overlay.style.color = "red";
    overlay.style.display = "flex";
    overlay.style.flexDirection = "column";
    overlay.style.justifyContent = "center";
    overlay.style.alignItems = "center";
    overlay.style.fontFamily = "Courier New";
    overlay.style.zIndex = "99999";
    overlay.style.animation = "shake 0.08s infinite";

    overlay.innerHTML = `
        <h1 style="
            font-size:70px;
            text-shadow:0 0 20px red;
        ">
            ⚠ SYSTEM BREACH ⚠
        </h1>

        <p style="font-size:30px;color:white;">
            Analyse des données...
        </p>

        <p id="countdown" style="
            font-size:80px;
            color:lime;
            margin-top:20px;
            text-shadow:0 0 20px lime;
        ">
            12
        </p>

        <p style="
            font-size:35px;
            margin-top:20px;
        ">
            Maintenant je sais qui tu es.
        </p>

        <p style="
            font-size:55px;
            color:red;
            text-shadow:0 0 20px red;
        ">
            GAME ON, DUBINKS.
        </p>

        <p id="status" style="
            color:white;
            margin-top:25px;
            font-size:24px;
        ">
            Initialisation...
        </p>
    `;

    document.body.appendChild(overlay);

    // Vibrations
    navigator.vibrate?.([
        300,100,300,100,500,
        200,100,200,100,400
    ]);

    // Notifications
    if (Notification.permission !== "granted") {
        await Notification.requestPermission();
    }

    function spamNotif(){
        if(Notification.permission === "granted"){
            new Notification("⚠ GAME ON", {
                body: "Dubinks, système compromis.",
                icon: "https://cdn-icons-png.flaticon.com/512/564/564619.png"
            });
        }
    }

    // Faux messages
    const msgs = [
        "Connexion au satellite...",
        "Caméra détectée...",
        "Synchronisation des fichiers...",
        "Téléchargement des données...",
        "Position GPS trouvée...",
        "Injection terminée..."
    ];

    let msgIndex = 0;

    setInterval(() => {
        document.getElementById("status").innerText =
            msgs[msgIndex % msgs.length];

        msgIndex++;
    }, 900);

    // Compte à rebours
    let time = 12;

    const interval = setInterval(() => {

        document.getElementById("countdown").innerText = time;

        spamNotif();

        time--;

        if(time < 0){

            clearInterval(interval);

            overlay.innerHTML = `
                <h1 style="
                    color:lime;
                    font-size:70px;
                    text-shadow:0 0 20px lime;
                ">
                    ✔ PRANK TERMINÉ
                </h1>

                <p style="
                    color:white;
                    font-size:30px;
                    margin-top:20px;
                ">
                    Tu t'es fait hacker pendant 12 secondes 😭
                </p>
            `;

            navigator.vibrate?.(0);
        }

    },1000);

});

// Animation
const style = document.createElement("style");

style.innerHTML = `
@keyframes shake{
    0%{transform:translate(2px,2px);}
    25%{transform:translate(-2px,1px);}
    50%{transform:translate(2px,-2px);}
    75%{transform:translate(-1px,2px);}
    100%{transform:translate(2px,1px);}
}
`;

document.head.appendChild(style);
</script>
